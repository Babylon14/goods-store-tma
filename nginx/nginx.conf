server {
    listen 80;

    # Общие заголовки для всех прокси-запросов
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;

    # 1. Картинки и статика бэкенда
    location /static/ {
    proxy_pass http://backend:8000/api/static/;
    
    # кеширование для ускорения Mini App
    expires 30d;
    add_header Cache-Control "public, no-transform";
    }

    # 2. Запросы к API и Swagger
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 3. Фронтенд (React/Vite)
    location / {
        proxy_pass http://frontend:5173;
        
        # Поддержка WebSocket (Hot Module Replacement для Vite)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Оптимизация загрузки
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s; 
    }
}


