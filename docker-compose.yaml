services:
  # --- DATABASE POSTGRESQL ---
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- DB PGADMIN ---
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  # --- CACHE / BROKER REDIS---
  redis:
    image: redis:7-alpine
    restart: always

    # --- NGINX ---
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

  # --- BACKEND (API) ---
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/app
      - /app/.venv
      - ./backend/uploads:/app/backend/uploads
    env_file: .env
    expose:
      - "8000"
    depends_on:
      - db
      - redis

    # --- FRONTEND (React) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

  # --- CELERY WORKER ---
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    # Переопределяем команду запуска для воркера
    command: uv run celery -A src.core.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db

  # --- TELEGRAM BOT ---
  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/app
      - /app/.venv
      - ./backend/uploads:/app/backend/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/backend:/app
      - DATABASE_URL=${DATABASE_URL}
      - BOT_TOKEN=${BOT_TOKEN}
    command: python -m backend.src.bot_main
    depends_on:
      - db
      - backend


volumes:
  postgres_data:
